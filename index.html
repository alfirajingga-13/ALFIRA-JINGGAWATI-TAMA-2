<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Pink World - Formulir Tugas 2 | Alfira Jinggawati Tama</title>
    <style>
        :root {
            --pink: #ff69b4;
            --light-pink: #ffb6c1;
            --dark-pink: #db7093;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #fff0f5;
            color: #444;
        }
        header {
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            color: white;
            padding: 55px 20px;
            text-align: center;
        }
        header h1 { font-size: 2.6rem; }
        nav {
            background: var(--light-pink);
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }
        nav a {
            color: white;
            padding: 16px 28px;
            text-decoration: none;
            font-weight: 600;
            transition: 0.3s;
        }
        nav a:hover { background: var(--dark-pink); }

        .container {
            max-width: 950px;
            margin: 40px auto;
            padding: 40px 30px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 15px 40px rgba(255,105,180,0.15);
        }
        h2 {
            color: var(--dark-pink);
            margin: 35px 0 15px;
            padding-left: 12px;
            border-left: 6px solid var(--pink);
        }
        form { max-width: 720px; margin: 0 auto; }
        label {
            display: block;
            margin: 20px 0 8px;
            font-weight: 600;
            color: #555;
        }
        input, select, textarea {
            width: 100%;
            padding: 13px 16px;
            border: 2px solid #ffd1dc;
            border-radius: 12px;
            font-size: 1.05rem;
        }
        input:focus, select:focus, textarea:focus {
            border-color: var(--pink);
            box-shadow: 0 0 0 4px rgba(255,105,180,0.2);
            outline: none;
        }
        .radio-group {
            display: flex;
            gap: 20px;
            margin: 12px 0 25px;
        }
        .radio-option {
            flex: 1;
            padding: 15px;
            text-align: center;
            border: 2px solid #ffd1dc;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }
        input[type="radio"] { display: none; }
        input[type="radio"]:checked + .radio-option {
            background: var(--pink);
            color: white;
            border-color: var(--pink);
        }
        button {
            background: var(--pink);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            width: 100%;
            margin-top: 30px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: var(--dark-pink);
            transform: scale(1.05);
        }
        footer {
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, var(--pink), var(--dark-pink));
            color: white;
            margin-top: 60px;
        }
        .hero {
            width: 100%;
            height: 320px;
            object-fit: cover;
            border-radius: 16px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <header>
        <h1>My Pink World 💕</h1>
        <p>Formulir Pengumpulan Data - Tugas 2</p>
    </header>

    <nav>
        <a href="index.html">Beranda</a>
        <a href="biodata.html">Biodata</a>
        <a href="foto.html">Foto</a>
        <a href="video.html">Video</a>
        <a href="#">Formulir Data</a>
    </nav>

    <div class="container">
        <img src="https://images.unsplash.com/photo-1518531933037-91b2f5f229cc?ixlib=rb-4.0.3&auto=format&fit=crop&w=1200&q=80" 
             alt="Pink Aesthetic" class="hero">

        <h2>Isi Formulir Data Diri & Transaksi Keuangan</h2>

        <!-- GANTI URL INI DENGAN URL WEB APP KAMU -->
        <form id="myForm" action="https://script.google.com/macros/s/AKfycbzy5SnuzoEtu9xn5QzbJlUtypIdJ9bT27CqiHNv7LGUsNHOk22dESNHsy_r91eTXsH2/exec" method="POST">

            <!-- Data Demografi -->
            <h2>Data Demografi</h2>
            <label>Nama Lengkap</label>
            <input type="text" name="nama" required>

            <label>Tanggal Lahir</label>
            <input type="date" name="tanggal_lahir" required>

            <label>Alamat Lengkap</label>
            <textarea name="alamat" rows="3" required></textarea>

            <label>No. Telepon / WA</label>
            <input type="tel" name="no_telepon" required>

            <label>Email</label>
            <input type="email" name="email" required>

            <label>Pendidikan Terakhir</label>
            <select name="pendidikan" required>
                <option value="">Pilih Pendidikan</option>
                <option value="SMA/SMK">SMA/SMK</option>
                <option value="D3">D3</option>
                <option value="S1">S1</option>
                <option value="S2">S2</option>
                <option value="Lainnya">Lainnya</option>
            </select>

            <!-- Data Bank -->
            <h2>Data Bank</h2>
            <label>Nama Bank</label>
            <select name="nama_bank" required>
                <option value="">Pilih Bank</option>
                <option value="BCA">BCA</option>
                <option value="BNI">BNI</option>
                <option value="BRI">BRI</option>
                <option value="Mandiri">Mandiri</option>
                <option value="BSI">Bank Syariah Indonesia (BSI)</option>
                <option value="Lainnya">Lainnya</option>
            </select>

            <label>Nomor Rekening</label>
            <input type="text" name="no_rekening" required>

            <!-- Data Transaksi -->
            <h2>Data Transaksi Keuangan</h2>
            <label>Tanggal Transaksi</label>
            <input type="date" name="tanggal_transaksi" required>

            <label>Uraian Transaksi</label>
            <input type="text" name="uraian" placeholder="Contoh: Bayar kos, Terima gaji" required>

            <label>Jenis Transaksi</label>
            <div class="radio-group">
                <label>
                    <input type="radio" name="jenis_transaksi" value="Debet" required>
                    <span class="radio-option">Debet (Pengeluaran)</span>
                </label>
                <label>
                    <input type="radio" name="jenis_transaksi" value="Kredit" required>
                    <span class="radio-option">Kredit (Pemasukan)</span>
                </label>
            </div>

            <label>Nominal Debet (Rp)</label>
            <input type="number" name="debet" placeholder="0 jika tidak ada">

            <label>Nominal Kredit (Rp)</label>
            <input type="number" name="kredit" placeholder="0 jika tidak ada">

            <button type="submit">Kirim Data ke Google Sheets 💖</button>
        </form>
    </div>

    <footer>
        <p>&copy; 2026 Alfira Jinggawati Tama | Tugas 2 - Universitas Lambung Mangkurat</p>
    </footer>

    <script>
        const form = document.getElementById('myForm');
        form.addEventListener('submit', function(e) {
            // Optional: tambahkan loading atau konfirmasi
            setTimeout(() => {
                alert("✅ Terima kasih! Data berhasil dikirim ke Google Sheets.");
            }, 500);
        });
    </script>
</body>
</html>
