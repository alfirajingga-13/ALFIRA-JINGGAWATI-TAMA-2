<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulir Data Pengguna & Transaksi Keuangan</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        body { font-family: 'Inter', system_ui, sans-serif; }
        .tailwind-ready * { transition-property: color, background-color, border-color, text-decoration-color, fill, stroke; transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); transition-duration: 150ms; }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-900">
    <div class="max-w-4xl mx-auto min-h-screen py-12 px-6">
        <!-- Header -->
        <div class="flex items-center justify-between mb-10">
            <div>
                <h1 class="text-4xl font-semibold text-white">📋 Formulir Pengumpulan Data</h1>
                <p class="text-zinc-400 mt-2 text-lg">Data demografi, rekening bank, dan transaksi keuangan</p>
            </div>
            <div class="px-5 py-2 bg-emerald-600 text-white text-sm font-medium rounded-3xl flex items-center gap-2">
                <div class="w-3 h-3 bg-white rounded-full animate-pulse"></div>
                Siap terhubung ke Google Sheet
            </div>
        </div>

        <form id="mainForm" class="space-y-10">
            
            <!-- SECTION 1: DATA DEMOGRAFI -->
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 bg-blue-100 text-blue-600 rounded-2xl flex items-center justify-center text-xl">👤</div>
                    <h2 class="text-2xl font-semibold">Data Demografi</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Nama -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Nama Lengkap</label>
                        <input id="nama" type="text" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="Masukkan nama lengkap Anda">
                    </div>

                    <!-- Tanggal Lahir -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Tanggal Lahir</label>
                        <div id="birth-date-container" class="flex gap-3">
                            <!-- populated by JS -->
                        </div>
                    </div>

                    <!-- Alamat -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Alamat Lengkap</label>
                        <textarea id="alamat" rows="3" required
                                  class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 resize-none"
                                  placeholder="Jl. Contoh No. 123, Kota, Provinsi"></textarea>
                    </div>

                    <!-- No Telepon -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Nomor Telepon</label>
                        <input id="no-telepon" type="tel" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="0812-3456-7890">
                    </div>

                    <!-- Email -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Email</label>
                        <input id="email" type="email" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="nama@email.com">
                    </div>

                    <!-- Pendidikan (searchable datalist) -->
                    <div class="md:col-span-2">
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Pendidikan Terakhir</label>
                        <input id="pendidikan-input" list="pendidikan-list" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="Pilih atau ketik pendidikan Anda">
                        <datalist id="pendidikan-list">
                            <option value="SD"></option>
                            <option value="SMP"></option>
                            <option value="SMA / SMK"></option>
                            <option value="Diploma 1 (D1)"></option>
                            <option value="Diploma 3 (D3)"></option>
                            <option value="Sarjana (S1)"></option>
                            <option value="Magister (S2)"></option>
                            <option value="Doktor (S3)"></option>
                            <option value="Lainnya"></option>
                        </datalist>
                    </div>
                </div>
            </div>

            <!-- SECTION 2: DATA BANK -->
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <div class="flex items-center gap-3 mb-6">
                    <div class="w-8 h-8 bg-amber-100 text-amber-600 rounded-2xl flex items-center justify-center text-xl">🏦</div>
                    <h2 class="text-2xl font-semibold">Data Bank</h2>
                </div>
                
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <!-- Nama Bank (searchable datalist) -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Nama Bank</label>
                        <input id="nama-bank" list="bank-list" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="Pilih atau ketik nama bank">
                        <datalist id="bank-list">
                            <option value="Bank Central Asia (BCA)"></option>
                            <option value="Bank Negara Indonesia (BNI)"></option>
                            <option value="Bank Mandiri"></option>
                            <option value="Bank Rakyat Indonesia (BRI)"></option>
                            <option value="Bank Tabungan Negara (BTN)"></option>
                            <option value="Bank CIMB Niaga"></option>
                            <option value="Bank Danamon"></option>
                            <option value="Bank Permata"></option>
                            <option value="Bank Maybank Indonesia"></option>
                            <option value="OCBC NISP"></option>
                            <option value="Bank Syariah Indonesia (BSI)"></option>
                            <option value="Lainnya"></option>
                        </datalist>
                    </div>

                    <!-- Nomor Rekening -->
                    <div>
                        <label class="block text-sm font-medium text-zinc-500 mb-2">Nomor Rekening</label>
                        <input id="no-rekening" type="text" required
                               class="w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-lg"
                               placeholder="1234567890">
                    </div>
                </div>
            </div>

            <!-- SECTION 3: DATA TRANSAKSI -->
            <div class="bg-white rounded-3xl shadow-xl p-8">
                <div class="flex items-center justify-between mb-6">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 bg-purple-100 text-purple-600 rounded-2xl flex items-center justify-center text-xl">💰</div>
                        <h2 class="text-2xl font-semibold">Data Transaksi Keuangan</h2>
                    </div>
                    <button type="button" onclick="addTransaction()"
                            class="flex items-center gap-2 bg-purple-600 hover:bg-purple-700 text-white px-6 py-3 rounded-3xl font-medium">
                        <span class="text-xl leading-none">+</span> Tambah Transaksi
                    </button>
                </div>

                <!-- Container untuk transaksi dinamis -->
                <div id="transactions-container" class="space-y-6">
                    <!-- Transaksi akan ditambahkan oleh JavaScript -->
                </div>

                <p class="text-xs text-zinc-400 mt-4 text-center">Anda dapat menambahkan lebih dari satu transaksi dalam satu pengiriman formulir.</p>
            </div>

            <!-- SUBMIT BUTTON -->
            <button type="submit"
                    class="w-full py-5 bg-emerald-600 hover:bg-emerald-700 text-white text-xl font-semibold rounded-3xl shadow-lg flex items-center justify-center gap-3">
                <span>Kirim Semua Data ke Google Sheet</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7-7 7M5 12h14" />
                </svg>
            </button>
        </form>

        <div id="status" class="mt-6 text-center text-sm hidden"></div>
    </div>

    <script>
        // Tailwind CSS CDN initialization
        function initializeTailwind() {
            return {
                config(userConfig = {}) {
                    return {
                        content: [],
                        theme: { extend: {} },
                        plugins: [],
                        ...userConfig,
                    }
                },
                theme: { extend: {} },
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            const config = initializeTailwind().config({ theme: { extend: {} } })
            document.documentElement.setAttribute('data-tailwind-config', JSON.stringify(config))
        })

        // Data helper untuk bulan
        const months = [
            { name: "Januari", value: "01" }, { name: "Februari", value: "02" },
            { name: "Maret", value: "03" }, { name: "April", value: "04" },
            { name: "Mei", value: "05" }, { name: "Juni", value: "06" },
            { name: "Juli", value: "07" }, { name: "Agustus", value: "08" },
            { name: "September", value: "09" }, { name: "Oktober", value: "10" },
            { name: "November", value: "11" }, { name: "Desember", value: "12" }
        ]

        // Daftar jenis transaksi (button)
        const jenisTransaksiOptions = [
            "Gaji", "Bonus", "Belanja Harian", "Makanan & Minuman",
            "Transportasi", "Tagihan Listrik/Air", "Internet & Komunikasi",
            "Transfer Masuk", "Transfer Keluar", "Investasi", "Pinjaman", "Lainnya"
        ]

        // Fungsi helper untuk membuat select tanggal
        function createDaySelect() {
            const select = document.createElement('select')
            select.className = 'day-select w-1/3 px-4 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-base'
            for (let i = 1; i <= 31; i++) {
                const opt = document.createElement('option')
                opt.value = i.toString().padStart(2, '0')
                opt.textContent = i.toString().padStart(2, '0')
                select.appendChild(opt)
            }
            return select
        }

        function createMonthSelect() {
            const select = document.createElement('select')
            select.className = 'month-select w-1/3 px-4 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-base'
            months.forEach(m => {
                const opt = document.createElement('option')
                opt.value = m.value
                opt.textContent = m.name
                select.appendChild(opt)
            })
            return select
        }

        function createYearSelect() {
            const select = document.createElement('select')
            select.className = 'year-select w-1/3 px-4 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-blue-500 text-base'
            const currentYear = new Date().getFullYear()
            for (let y = currentYear - 100; y <= currentYear + 5; y++) {
                const opt = document.createElement('option')
                opt.value = y
                opt.textContent = y
                if (y === currentYear) opt.selected = true
                select.appendChild(opt)
            }
            return select
        }

        // Populate tanggal lahir (static)
        function populateBirthDate() {
            const container = document.getElementById('birth-date-container')
            container.innerHTML = `
                <div class="flex-1"></div>
                <div class="flex-1"></div>
                <div class="flex-1"></div>
            `
            // Replace dengan select
            const daySel = createDaySelect()
            daySel.id = 'day-lahir'
            const monthSel = createMonthSelect()
            monthSel.id = 'month-lahir'
            const yearSel = createYearSelect()
            yearSel.id = 'year-lahir'

            container.children[0].appendChild(daySel)
            container.children[1].appendChild(monthSel)
            container.children[2].appendChild(yearSel)
        }

        // Tambah satu baris transaksi baru
        function addTransaction() {
            const container = document.getElementById('transactions-container')
            const transId = 'trans-' + Date.now()

            const row = document.createElement('div')
            row.className = 'transaction-row bg-zinc-50 border border-zinc-100 rounded-3xl p-6'
            row.setAttribute('data-id', transId)

            row.innerHTML = `
                <div class="flex justify-between mb-5">
                    <div class="font-semibold text-lg">Transaksi #${container.children.length + 1}</div>
                    <button onclick="removeTransaction('${transId}')" 
                            class="text-red-500 hover:text-red-600 flex items-center text-sm font-medium">
                        ✕ Hapus
                    </button>
                </div>

                <div class="grid grid-cols-12 gap-5">
                    <!-- Tanggal Transaksi -->
                    <div class="col-span-12 md:col-span-5">
                        <label class="block text-zinc-500 text-sm mb-2">Tanggal Transaksi</label>
                        <div class="date-flex flex gap-3">
                            <!-- akan diisi JS -->
                        </div>
                    </div>

                    <!-- Uraian -->
                    <div class="col-span-12 md:col-span-7">
                        <label class="block text-zinc-500 text-sm mb-2">Uraian Transaksi</label>
                        <input type="text" class="uraian-input w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-purple-500 text-base" 
                               placeholder="Contoh: Pembelian bahan makanan">
                    </div>

                    <!-- Jenis Transaksi (button group) -->
                    <div class="col-span-12">
                        <label class="block text-zinc-500 text-sm mb-2">Jenis Transaksi</label>
                        <div class="jenis-group flex flex-wrap gap-2"></div>
                        <input type="hidden" class="jenis-input" value="">
                    </div>

                    <!-- Debet & Kredit -->
                    <div class="col-span-6">
                        <label class="block text-zinc-500 text-sm mb-2">Debet (Rp)</label>
                        <input type="number" class="debet-input w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-purple-500 text-base" 
                               placeholder="0" step="1000">
                    </div>
                    <div class="col-span-6">
                        <label class="block text-zinc-500 text-sm mb-2">Kredit (Rp)</label>
                        <input type="number" class="kredit-input w-full px-5 py-4 border border-zinc-200 rounded-3xl focus:outline-none focus:border-purple-500 text-base" 
                               placeholder="0" step="1000">
                    </div>
                </div>
            `

            container.appendChild(row)

            // Populate tanggal
            const dateFlex = row.querySelector('.date-flex')
            const daySel = createDaySelect()
            const monthSel = createMonthSelect()
            const yearSel = createYearSelect()
            dateFlex.appendChild(daySel)
            dateFlex.appendChild(monthSel)
            dateFlex.appendChild(yearSel)

            // Populate button jenis transaksi
            const jenisGroup = row.querySelector('.jenis-group')
            jenisTransaksiOptions.forEach(jenis => {
                const btn = document.createElement('button')
                btn.type = 'button'
                btn.className = 'px-6 py-3 text-sm font-medium border border-zinc-300 hover:border-purple-300 rounded-3xl'
                btn.textContent = jenis
                btn.dataset.jenis = jenis
                btn.onclick = function () {
                    // Reset semua button di group ini
                    jenisGroup.querySelectorAll('button').forEach(b => {
                        b.classList.remove('bg-purple-600', 'text-white', 'border-purple-600')
                    })
                    // Aktifkan yang diklik
                    this.classList.add('bg-purple-600', 'text-white', 'border-purple-600')
                    // Simpan ke hidden input
                    row.querySelector('.jenis-input').value = jenis
                }
                jenisGroup.appendChild(btn)
            })
        }

        // Hapus transaksi
        window.removeTransaction = function (id) {
            const row = document.querySelector(`[data-id="${id}"]`)
            if (row) row.remove()
        }

        // Submit form ke Google Apps Script
        async function handleSubmit(e) {
            e.preventDefault()

            const statusEl = document.getElementById('status')
            statusEl.classList.remove('hidden')
            statusEl.innerHTML = `<span class="text-amber-500">⏳ Mengirim data ke Google Sheet...</span>`

            // Ambil data demografi
            const dayLahir = document.getElementById('day-lahir').value
            const monthLahir = document.getElementById('month-lahir').value
            const yearLahir = document.getElementById('year-lahir').value

            const formData = {
                demografi: {
                    nama: document.getElementById('nama').value,
                    tanggalLahir: `${dayLahir}/${monthLahir}/${yearLahir}`,
                    alamat: document.getElementById('alamat').value,
                    noTelepon: document.getElementById('no-telepon').value,
                    email: document.getElementById('email').value,
                    pendidikan: document.getElementById('pendidikan-input').value
                },
                bank: {
                    namaBank: document.getElementById('nama-bank').value,
                    noRekening: document.getElementById('no-rekening').value
                },
                transaksi: []
            }

            // Ambil semua transaksi
            document.querySelectorAll('.transaction-row').forEach(row => {
                const day = row.querySelector('.day-select').value
                const month = row.querySelector('.month-select').value
                const year = row.querySelector('.year-select').value
                const uraian = row.querySelector('.uraian-input').value.trim()
                const jenis = row.querySelector('.jenis-input').value
                const debet = parseFloat(row.querySelector('.debet-input').value) || 0
                const kredit = parseFloat(row.querySelector('.kredit-input').value) || 0

                if (uraian && jenis) {
                    formData.transaksi.push({
                        tanggalTransaksi: `${day}/${month}/${year}`,
                        uraian: uraian,
                        jenis: jenis,
                        debet: debet,
                        kredit: kredit
                    })
                }
            })

            // GANTI DENGAN URL GOOGLE SCRIPT ANDA (lihat panduan di bawah)
            const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycb.../exec'   // ← GANTI INI

            if (SCRIPT_URL.includes('...')) {
                alert('⚠️ Belum mengganti SCRIPT_URL dengan URL Google Apps Script Anda!')
                statusEl.innerHTML = `<span class="text-red-500">Ganti SCRIPT_URL terlebih dahulu di kode HTML</span>`
                return
            }

            try {
                const response = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(formData),
                    mode: 'no-cors'   // Google Script biasanya butuh ini untuk cross-origin
                })

                // Karena no-cors, kita tidak bisa baca response body, tapi kita anggap sukses jika tidak error
                statusEl.innerHTML = `
                    <div class="inline-flex items-center gap-2 bg-emerald-100 text-emerald-700 px-6 py-3 rounded-3xl">
                        ✅ Data berhasil dikirim ke Google Sheet!
                    </div>
                `
                // Reset form setelah sukses
                setTimeout(() => {
                    document.getElementById('mainForm').reset()
                    document.getElementById('transactions-container').innerHTML = ''
                    populateBirthDate()
                }, 2000)

            } catch (err) {
                console.error(err)
                statusEl.innerHTML = `<span class="text-red-500">❌ Gagal mengirim. Cek koneksi atau URL script.</span>`
            }
        }

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', () => {
            populateBirthDate()
            // Tambahkan satu transaksi kosong otomatis
            addTransaction()

            const form = document.getElementById('mainForm')
            form.addEventListener('submit', handleSubmit)
        })
    </script>
</body>
</html>
